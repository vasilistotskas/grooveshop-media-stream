allowBuilds:
  '@nestjs/core': true
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  sharp: true
overrides:
  lodash: '>=4.18.1'
  # CVE-2026-9697, CVE-2026-6734, CVE-2026-12151 (HIGH) — undici
  # 7.x line patched in 7.28.0. Scoped to 7.x so the safe 6.x
  # copy is left untouched.
  'undici@>=7.0.0 <7.28.0': '>=7.28.0'
  # CVE-2026-5079 (HIGH) — multer DoS, patched in 2.2.0.
  'multer@<2.2.0': '>=2.2.0'
  # CVE-2026-12143 (HIGH) — form-data, patched in 4.0.6.
  'form-data@<4.0.6': '>=4.0.6'
minimumReleaseAgeExclude:
  - '@types/node@25.9.1'
  - isomorphic-dompurify@3.14.0
  - '@vitest/coverage-v8@4.1.7'
  - '@vitest/expect@4.1.7'
  - '@vitest/mocker@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/runner@4.1.7'
  - '@vitest/snapshot@4.1.7'
  - '@vitest/spy@4.1.7'
  - '@vitest/utils@4.1.7'
  - vitest@4.1.7
  - eslint@10.6.0
