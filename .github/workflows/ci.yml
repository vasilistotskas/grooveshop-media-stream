name: CI

on:
  push:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
  pull_request:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SYSTEM_ENV: ci

jobs:
  ci:
    name: Quality, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      BULL_REDIS_HOST: localhost
      BULL_REDIS_PORT: 6379
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@vasilistotskas'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm run lint

      - name: Build application
        run: pnpm run build

      - name: Check TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run unit tests with coverage
        run: pnpm run test:coverage
        timeout-minutes: 10

      - name: Run E2E tests
        run: pnpm run test:e2e
        timeout-minutes: 15

      - name: Test production build
        env:
          NODE_ENV: production
          CORS_ORIGIN: https://webside.gr
          REDIS_PASSWORD: ci_smoke_test_password
        run: |
          timeout 10s pnpm run prod || exit_code=$?
          if [ $exit_code -eq 124 ]; then
            echo "Production build starts successfully"
          else
            echo "Production build failed with exit code $exit_code"
            exit $exit_code
          fi

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
            node -e "
              const fs = require('fs');
              const s = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')).total;
              console.log('| Metric | Coverage | Covered / Total |');
              console.log('|--------|----------|-----------------|');
              console.log(\`| Statements | \${s.statements.pct}% | \${s.statements.covered} / \${s.statements.total} |\`);
              console.log(\`| Branches   | \${s.branches.pct}% | \${s.branches.covered} / \${s.branches.total} |\`);
              console.log(\`| Functions  | \${s.functions.pct}% | \${s.functions.covered} / \${s.functions.total} |\`);
              console.log(\`| Lines      | \${s.lines.pct}% | \${s.lines.covered} / \${s.lines.total} |\`);
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            build/dist/
            package.json
            pnpm-lock.yaml
          retention-days: 7

  release:
    name: Release
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency: release
    environment: release
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.MEDIA_STREAM_GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@vasilistotskas'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: ./

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.MEDIA_STREAM_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run semantic-release

      - name: Upload release artifacts
        if: steps.release.outputs.new_release_published == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.release.outputs.new_release_version }}
          path: |
            build/dist/
            CHANGELOG.md
          retention-days: 90

      - name: Create Docker image tag
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          echo "New version: ${{ steps.release.outputs.new_release_version }}"
          echo "IMAGE_TAG=${{ steps.release.outputs.new_release_version }}" >> $GITHUB_ENV
